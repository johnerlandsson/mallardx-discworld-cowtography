id                  = "net.mallard.discworld-cowtography"
name                = "Discworld Cowtography"
version             = "0.23.1"
description         = "Minimap and database search for Discworld MUD. Search Quow's database for rooms, items, shops and NPCs, speedwalk to any result, and view the map panel as you move."
language            = "lua"
entry               = "src/main.lua"
mallard_api_version = "1.0"
minimum_app_version = "0.11.0"
authors             = ["John Erlandsson"]
license             = "MIT"

[worlds]
match = ["discworld.starturtle.net:*"]

[permissions]
sends       = true
gmcp_access = ["room.info", "char.info", "char.info.*", "char.info.capname"]

[gmcp]
advertise = ["room.info", "char.info"]

[panels.map]
title        = "Map"
entry        = "ui/mapper.html"
default_dock = "right"
default_size = { width = 360, height = 360 }

[[keymaps]]
name = "Cowtography"

[[keymaps.bindings]]
combo = "Ctrl+Shift+m"
command = "map_focus"
label = "Focus map (arrows pan, +/- zoom, Escape releases)"

[settings.walk_sound]
type    = "enum"
default = "none"
label   = "Walk arrival sound"
description = "Sound to play when a db walk completes."
choices = [
  { value = "none",                   label = "None"            },
  { value = "mallard:chime-chomp",    label = "Chime: Chomp"   },
  { value = "mallard:chime-high",     label = "Chime: High"    },
  { value = "mallard:chime-low",      label = "Chime: Low"     },
  { value = "mallard:chime-vibe",     label = "Chime: Vibe"    },
  { value = "mallard:clock-chime",    label = "Clock Chime"    },
  { value = "mallard:ding-ding-ding", label = "Ding Ding Ding" },
  { value = "mallard:ding-ding-high", label = "Ding Ding High" },
  { value = "mallard:ding-ding-low",  label = "Ding Ding Low"  },
  { value = "mallard:ding-dong",      label = "Ding Dong"      },
  { value = "mallard:ding-dong2",     label = "Ding Dong 2"    },
  { value = "mallard:tritone-chime",  label = "Tritone Chime"  },
]

[settings.map_style]
type        = "enum"
default     = "svg"
label       = "Map style"
description = "SVG vector maps or classic pixel art PNG maps from Quow's Cow Bar."
choices = [
  { value = "svg", label = "SVG (vector)"           },
  { value = "png", label = "PNG (classic pixel art)" },
]
