<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
     viewBox="0 0 5809 5000" width="5809" height="5000">
  <defs>
    <pattern id="hbd" x="0" y="0" width="2000" height="600"
             patternUnits="userSpaceOnUse" patternTransform="rotate(-25)">
      <text x="0" y="420" font-family="Georgia, serif" font-size="200"
            font-style="italic" fill="#7a5a10" opacity="0.13"
            letter-spacing="12">HERE BE DRAGONS</text>
    </pattern>
  </defs>
  <g id="layer-base" inkscape:label="Base">
    <rect width="5809" height="5000" fill="#0e0c08"/>
    <rect width="5809" height="5000" fill="url(#hbd)"/>
  </g>
  <g id="layer-terrain" inkscape:label="Terrain">
  </g>
  <g id="layer-labels" inkscape:label="Labels">
  </g>
  <g id="layer-player" inkscape:label="Player">
    <circle id="world-player" r="30" fill="#ff3b30" stroke="#fff" stroke-width="4" style="display:none"/>
  </g>
</svg>
